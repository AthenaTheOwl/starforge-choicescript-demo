name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  choicescript:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python tools/check_release.py --clean --fail-on-generated
